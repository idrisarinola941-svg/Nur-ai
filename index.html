<!DOCTYPE html>
<html>
<head>
  <title>Nur AI</title>
  <style>
    body {
      background: #0d0d0d;
      color: white;
      font-family: Arial;
    }
    #chat {
      height: 80vh;
      overflow-y: auto;
      padding: 10px;
    }
    .user { color: #4fc3f7; }
    .ai { color: #ffd54f; }
    input {
      width: 80%;
      padding: 10px;
    }
    button {
      padding: 10px;
      background: gold;
      border: none;
    }
  </style>
</head>

<body>

<h2>🤖 Nur AI</h2>

<div id="chat"></div>

<input id="msg" placeholder="Type message..." />
<button onclick="send()">Send</button>

<script>
const API_KEY = "YOUR_API_KEY_HERE";

async function send() {
  let input = document.getElementById("msg");
  let chat = document.getElementById("chat");

  let userMsg = input.value;
  chat.innerHTML += `<p class='user'>You: ${userMsg}</p>`;

  input.value = "";

  let response = await fetch("https://api.openai.com/v1/chat/completions", {
    method: "POST",
    headers: {
      "Authorization": "Bearer " + API_KEY,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      model: "gpt-4o-mini",
      messages: [
        { role: "system", content: "You are a helpful Islamic AI assistant." },
        { role: "user", content: userMsg }
      ]
    })
  });

  let data = await response.json();
  let aiMsg = data.choices[0].message.content;

  chat.innerHTML += `<p class='ai'>AI: ${aiMsg}</p>`;
  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
